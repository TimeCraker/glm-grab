<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" width="1280" height="460" font-family="-apple-system,Inter,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="hot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1280" height="460" fill="url(#bg)"/>

  <text x="640" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#fde047">抢购时序图 · GRAB TIMELINE</text>
  <text x="640" y="62" text-anchor="middle" font-size="11" fill="#a8a29e" letter-spacing="3">IDLE → WARM-UP → HIGH-FREQ → FIRE → DONE</text>

  <!-- horizontal timeline -->
  <line x1="120" y1="180" x2="1160" y2="180" stroke="url(#hot)" stroke-width="2"/>

  <!-- 5 stages -->
  <g>
    <!-- IDLE -->
    <circle cx="200" cy="180" r="14" fill="#1c1917" stroke="#94a3b8" stroke-width="2"/>
    <text x="200" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#cbd5e1">💤 IDLE</text>
    <text x="200" y="240" text-anchor="middle" font-size="11" fill="#64748b">监听触发信号</text>
    <text x="200" y="256" text-anchor="middle" font-size="10" fill="#475569">t &lt; 09:56</text>

    <!-- WARM-UP -->
    <circle cx="440" cy="180" r="14" fill="#1c1917" stroke="#fbbf24" stroke-width="2"/>
    <text x="440" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#fde047">⏰ WARM-UP</text>
    <text x="440" y="240" text-anchor="middle" font-size="11" fill="#94a3b8">打开 4 个 tab · 加载页面</text>
    <text x="440" y="256" text-anchor="middle" font-size="10" fill="#475569">t = 09:56 ~ 09:58</text>

    <!-- HIGH-FREQ -->
    <circle cx="680" cy="180" r="14" fill="#1c1917" stroke="#f97316" stroke-width="2"/>
    <text x="680" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#fdba74">🔥 HIGH-FREQ</text>
    <text x="680" y="240" text-anchor="middle" font-size="11" fill="#94a3b8">400ms 循环 · 扫描按钮</text>
    <text x="680" y="256" text-anchor="middle" font-size="10" fill="#475569">t = 09:58 ~ 10:00</text>

    <!-- FIRE -->
    <circle cx="920" cy="180" r="16" fill="#dc2626" stroke="#fef2f2" stroke-width="3"/>
    <text x="920" y="60" text-anchor="middle" font-size="16" font-weight="900" fill="#fef2f2">⚡ FIRE</text>
    <text x="920" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#fca5a5">🟢 命中 → 立即点击</text>
    <text x="920" y="240" text-anchor="middle" font-size="11" fill="#94a3b8">4 tab 并发抢 · 第一个成功即停</text>
    <text x="920" y="256" text-anchor="middle" font-size="10" fill="#fca5a5">t = 10:00:00.000</text>

    <!-- DONE -->
    <circle cx="1100" cy="180" r="14" fill="#1c1917" stroke="#22c55e" stroke-width="2"/>
    <text x="1100" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">✅ DONE</text>
    <text x="1100" y="240" text-anchor="middle" font-size="11" fill="#94a3b8">订单确认页 + 通知</text>
    <text x="1100" y="256" text-anchor="middle" font-size="10" fill="#475569">t = 10:00:00.x</text>
  </g>

  <!-- arrows between -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="214" y1="180" x2="426" y2="180"/>
    <line x1="454" y1="180" x2="666" y2="180"/>
    <line x1="694" y1="180" x2="906" y2="180"/>
    <line x1="936" y1="180" x2="1086" y2="180"/>
  </g>

  <!-- bottom: tab strategy -->
  <g transform="translate(120, 310)">
    <rect width="1040" height="120" rx="14" fill="#0c0a09" stroke="#292524" stroke-width="1"/>
    <text x="20" y="30" font-size="13" font-weight="800" fill="#e7e5e4">多 Tab 并发策略 · MULTI-TAB STRATEGY</text>
    <g font-family="ui-monospace,SF Mono,monospace" font-size="11" fill="#cbd5e1">
      <text x="20" y="60">TAB_COUNT = 4    # 并发 tab 数（3-5 区间安全，&gt;5 容易被风控）</text>
      <text x="20" y="80">REFRESH_INTERVAL = 0.4   # 页面刷新间隔（秒）· 原 800ms 减半</text>
      <text x="20" y="100">SCAN_INTERVAL = 0.1     # 按钮扫描间隔（秒）· 高频模式</text>
    </g>
    <g transform="translate(720, 50)">
      <rect width="300" height="56" rx="8" fill="#1c1917" stroke="#fbbf24" stroke-width="1"/>
      <text x="20" y="22" font-size="11" font-weight="700" fill="#fde047">🏆 命中即停 (v2 优化)</text>
      <text x="20" y="42" font-size="10" fill="#a8a29e">一个 tab 抢到 → 其他 tab 立即停</text>
    </g>
  </g>

  <text x="640" y="450" text-anchor="middle" font-size="9" fill="#57534e">仅供学习研究使用 · 请遵守智谱 GLM Coding 用户协议 · TimeCraker · 2026</text>
</svg>
